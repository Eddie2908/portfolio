<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — DevPortfolio</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle" style="position:fixed;top:16px;right:16px;" aria-label="Toggle theme"></button>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <h1>Mot de passe oublié</h1>
                <p>Entrez votre email pour recevoir un lien de réinitialisation</p>
            </div>
            <form id="forgotForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@devportfolio.fr" required>
                </div>
                <button type="submit" class="btn-login">Envoyer le lien</button>
                <p style="text-align:center;margin-top:16px;font-size:13px">
                    <a href="login.html">Retour à la connexion</a>
                </p>
            </form>
        </div>
    </div>
    <script src="js/admin.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
