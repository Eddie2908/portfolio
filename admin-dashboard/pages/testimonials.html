        <main class="main-content">

                <h1 class="page-title">Témoignages</h1>
                <div class="header-actions"><button id="themeToggle" onclick="toggleTheme()" class="theme-toggle" aria-label="Basculer le thème" title="Basculer le thème"></button><button class="btn-primary" onclick="openModal()">+ Nouveau</button><div class="user-avatar" id="avatarInitials">AD</div></div>
            </header>
            <div class="content-area">
                <div class="data-table-wrapper">
                    <table class="data-table">
                        <thead><tr><th>Nom</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr></thead>
                        <tbody id="testimonialsTableBody">
                            <tr><td colspan="4" class="empty-cell">Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

    </div>

    <!-- Modal nouveau témoignage -->
    <div class="modal-overlay" id="testimonialModal">
        <div class="modal-box">
            <h3 id="modalTitle">Nouveau témoignage</h3>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Nom *</label><input type="text" id="tName" placeholder="Marie Laurent"></div>
            <div class="form-group"><label>Poste *</label><input type="text" id="tRole" placeholder="CEO, StartupX"></div>
            <div class="form-group"><label>Témoignage *</label><textarea id="tText" rows="4" placeholder="Message..."></textarea></div>
            <div class="form-group">
                <label>Statut</label>
                <select id="tStatus"><option value="published">Publié</option><option value="draft">Brouillon</option></select>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Annuler</button>
                <button class="btn-primary" onclick="saveTestimonial()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>
    let editingId = null;
    let testimonialsCache = [];

    function openModal(t) {
        editingId = t ? t.id : null;
        document.getElementById('modalTitle').textContent = t ? 'Modifier le témoignage' : 'Nouveau témoignage';
        document.getElementById('tName').value = t ? t.name : '';
        document.getElementById('tRole').value = t ? t.role : '';
        document.getElementById('tText').value = t ? t.text : '';
        document.getElementById('tStatus').value = t ? t.status : 'published';
        document.getElementById('testimonialModal').classList.add('open');
    }
    function openModalById(id) {
        openModal(testimonialsCache.find(t => t.id === id));
    }
    function closeModal() {
        document.getElementById('testimonialModal').classList.remove('open');
        editingId = null;
    }

    async function loadTestimonials() {
        try {
            const data = await apiGet('/admin/testimonials');
            const items = data?.items || data || [];
            testimonialsCache = items;
            const tbody = document.getElementById('testimonialsTableBody');
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-cell">Aucun témoignage</td></tr>';
                return;
            }
            tbody.innerHTML = items.map(t => `
                <tr>
                    <td><strong class="text-primary">${escapeHtml(t.name)}</strong></td>
                    <td class="text-secondary">${escapeHtml(t.role)}</td>
                    <td><span class="status-badge status-${escapeHtml(t.status)}">${t.status === 'published' ? 'Publié' : 'Brouillon'}</span></td>
                    <td>
                        <div class="table-actions">
                            <button class="action-btn" title="Modifier" onclick="openModalById(${JSON.stringify(t.id)})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="action-btn delete" title="Supprimer" onclick="deleteTestimonial(${JSON.stringify(t.id)})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch (e) { showNotification('Erreur de chargement', 'error'); }
    }

    async function saveTestimonial() {
        const name = document.getElementById('tName').value.trim();
        const role = document.getElementById('tRole').value.trim();
        const text = document.getElementById('tText').value.trim();
        const status = document.getElementById('tStatus').value;
        if (!name || !role || !text) { showNotification('Tous les champs sont obligatoires', 'error'); return; }
        try {
            if (editingId) {
                await apiPut(`/admin/testimonials/${editingId}`, { name, role, text, status });
                showNotification('Témoignage mis à jour');
            } else {
                await apiPost('/admin/testimonials', { name, role, text, status });
                showNotification('Témoignage ajouté');
            }
            closeModal();
            loadTestimonials();
        } catch (e) { showNotification(e.message || 'Erreur', 'error'); }
    }

    async function deleteTestimonial(id) {
        if (!confirmAction('Supprimer ce témoignage ?')) return;
        try {
            await apiDelete(`/admin/testimonials/${id}`);
            showNotification('Témoignage supprimé');
            loadTestimonials();
        } catch (e) { showNotification('Erreur', 'error'); }
    }

    document.getElementById('testimonialModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('DOMContentLoaded', loadTestimonials);
    </script>
</body>
