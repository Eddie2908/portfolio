                <h1 class="page-title">Utilisateurs</h1>
                <div class="header-actions">
                    <button onclick="openModal()" class="btn-primary btn-sm">+ Nouvel utilisateur</button>
                    <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle" aria-label="Basculer le thème" title="Basculer le thème"></button>

            </header>
            <div class="content-area">

                    <table class="data-table">
                        <thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Statut</th><th>Création</th><th>Actions</th></tr></thead>

                            <tr><td colspan="6" class="empty-cell">Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal nouvel utilisateur -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-box">
            <h3>Nouvel utilisateur</h3>
            <div class="form-group">
                <label>Nom complet *</label>
                <input type="text" id="newName" placeholder="Jean Dupont">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="newEmail" placeholder="jean@example.com">
            </div>
            <div class="form-group">
                <label>Mot de passe *</label>
                <input type="password" id="newPassword" placeholder="Min. 8 caractères">
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select id="newRole">
                    <option value="admin">Administrateur</option>
                    <option value="editor" selected>Editeur</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Annuler</button>
                <button class="btn-primary" onclick="createUser()">Créer</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>
    function openModal() { document.getElementById('userModal').classList.add('open'); }
    function closeModal() {
        document.getElementById('userModal').classList.remove('open');
        ['newName','newEmail','newPassword'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('newRole').value = 'editor';
    }

    function formatDate(iso) {
        if (!iso) return '-';
        return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
    }

    let usersCache = [];

    function renderUsers(users) {
        usersCache = users || [];
        const tbody = document.getElementById('usersTableBody');
        if (!users || users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Aucun utilisateur</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td><strong class="text-primary">${escapeHtml(u.name)}</strong></td>
                <td class="text-secondary">${escapeHtml(u.email)}</td>
                <td><span class="role-badge role-${escapeHtml(u.role)}">${escapeHtml(u.role)}</span></td>
                <td><span class="status-badge ${u.status === 'active' ? 'status-active' : ''}">${u.status === 'active' ? 'Actif' : escapeHtml(u.status)}</span></td>
                <td class="text-muted font-small">${formatDate(u.created_at)}</td>
                <td>
                    <div class="table-actions">
                        <button class="action-btn delete text-danger" title="Supprimer" onclick="deleteUser(${JSON.stringify(u.id)})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function loadUsers() {
        try {
            const users = await apiGet('/admin/users');
            renderUsers(users);
        } catch (e) {
            document.getElementById('usersTableBody').innerHTML =
                '<tr><td colspan="6" class="empty-cell text-danger">Erreur de chargement</td></tr>';
        }
    }

    async function createUser() {
        const name = document.getElementById('newName').value.trim();
        const email = document.getElementById('newEmail').value.trim();
        const password = document.getElementById('newPassword').value;
        const role = document.getElementById('newRole').value;
        if (!name || !email || !password) { showNotification('Tous les champs sont obligatoires', 'error'); return; }
        if (password.length < 8) { showNotification('Mot de passe trop court (min. 8 caractères)', 'error'); return; }
        try {
            await apiPost('/admin/users', { name, email, password, role });
            showNotification('Utilisateur créé avec succès');
            closeModal();
            loadUsers();
        } catch (e) { showNotification(e.message || 'Erreur lors de la création', 'error'); }
    }

    async function deleteUser(id) {
        const name = usersCache.find(u => u.id === id)?.name || '';
        if (!confirmAction(`Supprimer l'utilisateur "${name}" ?`)) return;
        try {
            await apiDelete(`/admin/users/${id}`);
            showNotification('Utilisateur supprimé');
            loadUsers();
        } catch (e) { showNotification(e.message || 'Erreur', 'error'); }
    }

    document.getElementById('userModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
