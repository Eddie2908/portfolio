<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compétences — Admin DevPortfolio</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/tables.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .skills-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; }
        .skill-group-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
        .skill-group-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .skill-group-title { display:flex; align-items:center; gap:10px; font-weight:600; font-size:15px; color:var(--text-primary); }
        .color-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
        .skill-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
        .skill-item:last-child { border-bottom:none; }
        .skill-bar-bg { flex:1; height:6px; background:var(--hover-bg); border-radius:4px; overflow:hidden; }
        .skill-bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
        .skill-name { width:140px; font-size:13px; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .skill-level { width:38px; text-align:right; font-size:12px; font-weight:600; }
        .skill-actions { display:flex; gap:6px; flex-shrink:0; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:none; align-items:center; justify-content:center; }
        .modal-overlay.active { display:flex; }
        .modal-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:28px; width:100%; max-width:460px; }
        .modal-title { font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:20px; }
        .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
        .color-swatches { display:flex; gap:8px; flex-wrap:wrap; }
        .swatch { width:28px; height:28px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:border-color 0.15s; }
        .swatch.selected { border-color:var(--text-primary); }
        .empty-state { text-align:center; padding:40px; color:var(--text-muted); }
        .group-add-btn { font-size:12px; padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:var(--hover-bg); color:var(--text-secondary); cursor:pointer; transition:background 0.15s; }
        .group-add-btn:hover { background:var(--hover-bg2); }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg><span>Admin<strong>Panel</strong></span></div></div>
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-item"><img src="../assets/icons/dashboard.svg" alt="" width="18"> Dashboard</a>
            <a href="projects.html" class="nav-item"><img src="../assets/icons/projects.svg" alt="" width="18"> Projets</a>
            <a href="skills.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg> Compétences</a>
            <a href="messages.html" class="nav-item"><img src="../assets/icons/messages.svg" alt="" width="18"> Messages</a>
            <a href="testimonials.html" class="nav-item"><img src="../assets/icons/users.svg" alt="" width="18"> Témoignages</a>
            <a href="blog.html" class="nav-item"><img src="../assets/icons/projects.svg" alt="" width="18"> Blog</a>
            <a href="users.html" class="nav-item"><img src="../assets/icons/users.svg" alt="" width="18"> Utilisateurs</a>
            <a href="settings.html" class="nav-item"><img src="../assets/icons/settings.svg" alt="" width="18"> Paramètres</a>
        </nav>
        <div class="sidebar-footer"><button onclick="logout()" class="nav-item logout-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Déconnexion</button></div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <button class="menu-toggle" onclick="toggleSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <h1 class="page-title">Compétences</h1>
            <div class="header-actions">
                <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle" aria-label="Toggle theme"></button>
                <button class="btn-primary" onclick="openModal()">+ Ajouter une compétence</button>
            </div>
        </header>

        <div class="content-area">
            <div id="skillsGrid" class="skills-grid">
                <div class="empty-state">Chargement...</div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Add/Edit Skill -->
<div class="modal-overlay" id="skillModal">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">Ajouter une compétence</div>
        <input type="hidden" id="editSkillId">
        <div class="form-group">
            <label for="skillCategory">Catégorie</label>
            <input type="text" id="skillCategory" placeholder="ex: Frontend, Backend, DevOps..." list="categorySuggestions">
            <datalist id="categorySuggestions"></datalist>
        </div>
        <div class="form-group">
            <label>Couleur de la catégorie</label>
            <div class="color-swatches" id="colorSwatches">
                <div class="swatch selected" data-color="#5865f5" style="background:#5865f5"></div>
                <div class="swatch" data-color="#c344f0" style="background:#c344f0"></div>
                <div class="swatch" data-color="#22c55e" style="background:#22c55e"></div>
                <div class="swatch" data-color="#f59e0b" style="background:#f59e0b"></div>
                <div class="swatch" data-color="#ef4444" style="background:#ef4444"></div>
                <div class="swatch" data-color="#3b82f6" style="background:#3b82f6"></div>
                <div class="swatch" data-color="#06b6d4" style="background:#06b6d4"></div>
                <div class="swatch" data-color="#ec4899" style="background:#ec4899"></div>
            </div>
            <input type="hidden" id="skillColor" value="#5865f5">
        </div>
        <div class="form-group">
            <label for="skillName">Nom de la compétence</label>
            <input type="text" id="skillName" placeholder="ex: React / Next.js">
        </div>
        <div class="form-group">
            <label for="skillLevel">Niveau : <span id="levelDisplay">80</span>%</label>
            <input type="range" id="skillLevel" min="0" max="100" value="80" oninput="document.getElementById('levelDisplay').textContent=this.value"
                style="width:100%;accent-color:var(--accent);">
        </div>
        <div class="form-group">
            <label for="skillOrder">Ordre d'affichage</label>
            <input type="number" id="skillOrder" min="0" value="0">
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal()">Annuler</button>
            <button class="btn-primary" onclick="saveSkill()">Enregistrer</button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script>
let allSkills = [];
let selectedColor = '#5865f5';

async function loadSkills() {
    try {
        const data = await apiGet('/admin/skills');
        allSkills = data.items || [];
        renderSkills();
        updateCategorySuggestions();
    } catch (e) {
        document.getElementById('skillsGrid').innerHTML = '<div class="empty-state">Erreur de chargement. Vérifiez votre connexion.</div>';
    }
}

function renderSkills() {
    const grid = document.getElementById('skillsGrid');
    if (!allSkills.length) {
        grid.innerHTML = '<div class="empty-state">Aucune compétence. Cliquez sur "+ Ajouter" pour commencer.</div>';
        return;
    }

    const groups = {};
    allSkills.forEach(s => {
        if (!groups[s.category]) groups[s.category] = { color: s.category_color, skills: [] };
        groups[s.category].skills.push(s);
    });

    grid.innerHTML = Object.entries(groups).map(([cat, { color, skills }]) => `
        <div class="skill-group-card">
            <div class="skill-group-header">
                <div class="skill-group-title">
                    <span class="color-dot" style="background:${color}"></span>
                    ${escHtml(cat)}
                </div>
                <button class="group-add-btn" onclick="openModal(null,'${escHtml(cat)}','${color}')">+ Skill</button>
            </div>
            ${skills.map(s => `
            <div class="skill-item" id="skill-${s.id}">
                <span class="skill-name" title="${escHtml(s.name)}">${escHtml(s.name)}</span>
                <div class="skill-bar-bg">
                    <div class="skill-bar-fill" style="width:${s.level}%;background:${color}"></div>
                </div>
                <span class="skill-level" style="color:${color}">${s.level}%</span>
                <div class="skill-actions">
                    <button class="action-btn" title="Modifier" onclick="openModal(${JSON.stringify(s).replace(/"/g,'&quot;')})">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                    <button class="action-btn delete" title="Supprimer" onclick="deleteSkill(${s.id})">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            </div>`).join('')}
        </div>`).join('');
}

function updateCategorySuggestions() {
    const cats = [...new Set(allSkills.map(s => s.category))];
    const dl = document.getElementById('categorySuggestions');
    dl.innerHTML = cats.map(c => `<option value="${escHtml(c)}">`).join('');
}

function openModal(skill = null, prefillCat = '', prefillColor = '#5865f5') {
    document.getElementById('modalTitle').textContent = skill ? 'Modifier la compétence' : 'Ajouter une compétence';
    document.getElementById('editSkillId').value = skill ? skill.id : '';
    document.getElementById('skillCategory').value = skill ? skill.category : prefillCat;
    document.getElementById('skillName').value = skill ? skill.name : '';
    document.getElementById('skillLevel').value = skill ? skill.level : 80;
    document.getElementById('levelDisplay').textContent = skill ? skill.level : 80;
    document.getElementById('skillOrder').value = skill ? skill.display_order : 0;

    const color = skill ? skill.category_color : prefillColor;
    setSelectedColor(color);

    document.getElementById('skillModal').classList.add('active');
}

function setSelectedColor(color) {
    selectedColor = color;
    document.getElementById('skillColor').value = color;
    document.querySelectorAll('.swatch').forEach(s => {
        s.classList.toggle('selected', s.dataset.color === color);
    });
}

function closeModal() {
    document.getElementById('skillModal').classList.remove('active');
}

async function saveSkill() {
    const id = document.getElementById('editSkillId').value;
    const payload = {
        category: document.getElementById('skillCategory').value.trim(),
        category_color: document.getElementById('skillColor').value,
        name: document.getElementById('skillName').value.trim(),
        level: parseInt(document.getElementById('skillLevel').value),
        display_order: parseInt(document.getElementById('skillOrder').value) || 0,
    };

    if (!payload.category || !payload.name) {
        showNotification('Catégorie et nom obligatoires', 'error');
        return;
    }

    try {
        if (id) {
            await apiPut(`/admin/skills/${id}`, payload);
            showNotification('Compétence mise à jour');
        } else {
            await apiPost('/admin/skills', payload);
            showNotification('Compétence ajoutée');
        }
        closeModal();
        loadSkills();
    } catch (e) {
        showNotification(e.message || 'Erreur', 'error');
    }
}

async function deleteSkill(id) {
    if (!confirm('Supprimer cette compétence ?')) return;
    try {
        await apiDelete(`/admin/skills/${id}`);
        showNotification('Compétence supprimée');
        loadSkills();
    } catch (e) {
        showNotification(e.message || 'Erreur', 'error');
    }
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => setSelectedColor(s.dataset.color));
});

document.getElementById('skillModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

document.addEventListener('DOMContentLoaded', loadSkills);
</script>
</body>
</html>
